substitutions:
- target: buttermilk
  options:
  - components:
    - milk
    - white_vinegar
    cost: 0.15
    note: 1 杯牛奶 + 1 汤匙白醋，静置 10 分钟
  - components:
    - milk
    - lemon_juice
    cost: 0.15
    note: 1 杯牛奶 + 1 汤匙柠檬汁，静置 10 分钟
  - components:
    - plain_yogurt
    - water
    cost: 0.2
    note: 3/4 杯酸奶 + 1/4 杯水稀释
  - components:
    - sour_cream
    - water
    cost: 0.25
    note: 酸奶油加水稀释到流动状
- target: milk
  options:
  - components:
    - powdered_milk
    - water
    cost: 0.1
    note: 按包装比例冲调奶粉
  - components:
    - heavy_cream
    - water
    cost: 0.12
    note: 淡奶油兑水稀释
- target: cake_flour
  options:
  - components:
    - all_purpose_flour
    - cornstarch
    cost: 0.2
    note: 1 杯中筋面粉取出 2 汤匙换成玉米淀粉
- target: self_raising_flour
  options:
  - components:
    - all_purpose_flour
    - baking_powder
    - salt
    cost: 0.1
    note: 1 杯面粉 + 1.5 茶匙泡打粉 + 0.25 茶匙盐
- target: baking_powder
  options:
  - components:
    - baking_soda
    - cream_of_tartar
    cost: 0.1
    note: 1 份小苏打 + 2 份塔塔粉
- target: heavy_cream
  options:
  - components:
    - milk
    - butter
    cost: 0.3
    note: 3/4 杯牛奶 + 1/4 杯融化黄油（不可打发）
- target: egg
  options:
  - components:
    - flaxseed
    - water
    cost: 0.35
    note: 1 汤匙亚麻籽粉 + 3 汤匙水，纯素
  - components:
    - applesauce
    cost: 0.4
    note: 1/4 杯苹果酱，适合蛋糕类
- target: butter
  options:
  - components:
    - oil
    cost: 0.3
    note: 用量约为黄油的 3/4
- target: honey
  options:
  - components:
    - maple_syrup
    cost: 0.15
    note: 等量替换
  - components:
    - sugar
    - water
    cost: 0.25
    note: 1 杯糖 + 1/4 杯水煮溶
- target: sour_cream
  options:
  - components:
    - greek_yogurt
    cost: 0.1
    note: 1 cup sour cream = 1 cup greek yogurt; tangier, lower fat
  - components:
    - heavy_cream
    - lemon_juice
    cost: 0.2
    note: 1 cup sour cream = 1 cup heavy cream + 1 tbsp lemon juice, rest 10 min to thicken
  - components:
    - silken_tofu
    - lemon_juice
    cost: 0.5
    note: 'dairy-free: blend 1 cup silken tofu + 1 tbsp lemon juice until smooth'
- target: cream_cheese
  options:
  - components:
    - greek_yogurt
    cost: 0.3
    note: strain 1 cup greek yogurt overnight in cheesecloth to firm up, then use 1:1
  - components:
    - mascarpone
    cost: 0.2
    note: use 1:1; richer and less tangy, good in frostings and cheesecake
  - components:
    - cashews
    - lemon_juice
    cost: 0.5
    note: 'dairy-free: blend 1 cup soaked cashews + 1 tbsp lemon juice + pinch salt'
- target: evaporated_milk
  options:
  - components:
    - milk
    cost: 0.2
    note: simmer 2.25 cups milk down to 1 cup, stirring, to make 1 cup evaporated milk
  - components:
    - half_and_half
    cost: 0.2
    note: use 1:1; richer but works in most baking and sauces
  - components:
    - coconut_milk
    cost: 0.4
    note: 'dairy-free: use 1:1 full-fat coconut milk; adds mild coconut flavor'
- target: sweetened_condensed_milk
  options:
  - components:
    - milk
    - sugar
    cost: 0.3
    note: simmer 1.25 cups milk + 1/2 cup sugar until reduced and thick, ~30 min
  - components:
    - coconut_milk
    - sugar
    cost: 0.4
    note: 'dairy-free: simmer 1.25 cups coconut milk + 1/2 cup sugar until thick'
- target: ricotta
  options:
  - components:
    - cottage_cheese
    cost: 0.2
    note: blend 1 cup cottage cheese smooth; drain first if very wet
  - components:
    - mascarpone
    cost: 0.3
    note: use 1:1 in sweet dishes; richer and creamier, less grainy
  - components:
    - silken_tofu
    - lemon_juice
    - salt
    cost: 0.5
    note: 'dairy-free: crumble 1 cup firm silken tofu + 1 tsp lemon juice + pinch salt'
- target: mascarpone
  options:
  - components:
    - cream_cheese
    - heavy_cream
    cost: 0.2
    note: beat 8 oz cream cheese + 1/4 cup heavy cream until smooth
  - components:
    - creme_fraiche
    cost: 0.2
    note: use 1:1; slightly tangier but similar richness
- target: half_and_half
  options:
  - components:
    - milk
    - heavy_cream
    cost: 0.1
    note: 1 cup = 3/4 cup milk + 1/4 cup heavy cream
  - components:
    - milk
    - butter
    cost: 0.3
    note: 1 cup = 7/8 cup milk + 1.5 tbsp melted butter
  - components:
    - coconut_milk
    cost: 0.4
    note: 'dairy-free: use 1:1 full-fat coconut milk in coffee or sauces'
- target: creme_fraiche
  options:
  - components:
    - sour_cream
    cost: 0.1
    note: use 1:1; slightly more tang, less stable when boiled
  - components:
    - heavy_cream
    - buttermilk
    cost: 0.3
    note: stir 1 cup heavy cream + 2 tbsp buttermilk, cover, rest 12-24h at room temp
  - components:
    - mascarpone
    cost: 0.3
    note: use 1:1; richer and less tangy
- target: greek_yogurt
  options:
  - components:
    - plain_yogurt
    cost: 0.2
    note: strain 1.5 cups plain yogurt in cheesecloth ~2h to yield 1 cup thick yogurt
  - components:
    - sour_cream
    cost: 0.2
    note: use 1:1; richer with less tang, fine for dips and baking
  - components:
    - silken_tofu
    - lemon_juice
    cost: 0.5
    note: 'dairy-free: blend 1 cup silken tofu + 2 tsp lemon juice until smooth'
- target: cottage_cheese
  options:
  - components:
    - ricotta
    cost: 0.2
    note: use 1:1; smoother texture, works in lasagna and pancakes
  - components:
    - greek_yogurt
    cost: 0.4
    note: use 1:1 for high-protein smoothies and dips; different texture
- target: whipping_cream
  options:
  - components:
    - heavy_cream
    cost: 0.1
    note: use 1:1; heavy cream has more fat and whips slightly stiffer
  - components:
    - coconut_cream
    cost: 0.4
    note: 'dairy-free: chill can overnight, whip the solid coconut cream like dairy cream'
- target: coconut_cream
  options:
  - components:
    - coconut_milk
    cost: 0.2
    note: chill full-fat coconut milk overnight and scoop the thick top layer
- target: bread_flour
  options:
  - components:
    - all_purpose_flour
    - vital_wheat_gluten
    cost: 0.1
    note: per 1 cup, replace 1.5 tsp all_purpose_flour with 1.5 tsp vital_wheat_gluten to raise protein
  - components:
    - all_purpose_flour
    cost: 0.3
    note: use all_purpose_flour 1:1; loaf is slightly less chewy with weaker rise
- target: pastry_flour
  options:
  - components:
    - all_purpose_flour
    - cornstarch
    cost: 0.1
    note: 1 cup = 2/3 cup all_purpose_flour + 1/3 cup cornstarch for lower protein
  - components:
    - all_purpose_flour
    - cake_flour
    cost: 0.1
    note: 1 cup = 1/2 cup all_purpose_flour + 1/2 cup cake_flour
- target: whole_wheat_flour
  options:
  - components:
    - all_purpose_flour
    - wheat_bran
    cost: 0.2
    note: 1 cup = 7/8 cup all_purpose_flour + 2 tbsp wheat_bran for fiber and color
  - components:
    - all_purpose_flour
    cost: 0.3
    note: use all_purpose_flour 1:1; lighter texture, less nutty flavor and fiber
- target: oat_flour
  options:
  - components:
    - rolled_oats
    cost: 0.0
    note: blend rolled_oats to a fine powder; 1.25 cups oats = 1 cup oat_flour
  - components:
    - all_purpose_flour
    cost: 0.4
    note: substitute up to 1/2 the oat_flour with all_purpose_flour; loses gluten-free status and oat
      flavor
- target: almond_flour
  options:
  - components:
    - coconut_flour
    cost: 0.5
    note: use only 1/4 the amount of coconut_flour and add extra liquid; very absorbent, drier crumb
  - components:
    - all_purpose_flour
    cost: 0.5
    note: 1:1 by volume in many recipes; loses gluten-free status and moist nutty texture
- target: rice_flour
  options:
  - components:
    - cornstarch
    cost: 0.3
    note: for coating/thickening use cornstarch 1:1; lighter crisp, not ideal for baking structure
  - components:
    - white_rice
    cost: 0.1
    note: grind dry white_rice to a fine flour in a blender; 1 cup rice = about 1.5 cups flour
  - components:
    - all_purpose_flour
    cost: 0.35
    note: 1:1 by volume when thickening; adds gluten and is less crisp for frying
- target: semolina
  options:
  - components:
    - all_purpose_flour
    cost: 0.3
    note: use all_purpose_flour 1:1 for pasta; softer, less toothsome bite
  - components:
    - corn_flour
    cost: 0.4
    note: use corn_flour 1:1 for dusting pizza peels; for dough it changes texture noticeably
- target: cornmeal
  options:
  - components:
    - polenta
    cost: 0.1
    note: use polenta 1:1; choose a similar grind, coarser gives more crunch
  - components:
    - grits
    cost: 0.2
    note: use grits 1:1; slightly different corn variety and texture
  - components:
    - corn_flour
    cost: 0.3
    note: use corn_flour 1:1; much finer so loses the gritty crunch
- target: breadcrumbs
